version: '3.9'

# Production overlay. Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Hardened further in the "Deployment Ready" milestone (health checks, resource limits, secrets).

services:
  postgres:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    # Re-declares only the persistent uploads volume — Compose overlays
    # replace the base file's `volumes:` list rather than merging it, and the
    # dev bind-mounts (src/prisma) must NOT carry over since prod runs the
    # baked image from Dockerfile, not Dockerfile.dev.
    volumes:
      - backend_uploads:/app/uploads
    ports: []
    restart: always
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    volumes: []
    ports: []
    restart: always
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/login', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    build:
      context: ./infrastructure/nginx
    container_name: vdr_nginx
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/letsencrypt:/etc/letsencrypt:ro
      - ./infrastructure/nginx/certbot-webroot:/var/www/certbot:ro
    networks:
      - vdr_network
    deploy:
      resources:
        limits:
          memory: 128M

  # Not a long-running service — run on demand via
  # infrastructure/scripts/init-letsencrypt.sh (first issuance) or the
  # renewal cron job (see DEPLOYMENT.md). Shares the same two volumes as
  # nginx: the webroot for the HTTP-01 challenge, and the certificate
  # directory nginx reads from.
  certbot:
    image: certbot/certbot:latest
    container_name: vdr_certbot
    volumes:
      - ./infrastructure/nginx/letsencrypt:/etc/letsencrypt
      - ./infrastructure/nginx/certbot-webroot:/var/www/certbot
    networks:
      - vdr_network
