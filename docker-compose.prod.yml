# Production overlay. Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Hardened further in the "Deployment Ready" milestone (health checks, resource limits, secrets).
#
# IMPORTANT: Compose merges `ports:`/`volumes:` lists ADDITIVELY across -f
# files — a plain `ports: []` here does NOT clear entries from
# docker-compose.yml's base `ports:`, it just contributes nothing to the
# union, silently leaving every service's dev-file port exposed on 0.0.0.0 in
# "production" mode and completely bypassing Nginx as the intended sole
# public entry point.
#
# The fix is the Compose Specification's `!override` tag, NOT `!reset`.
# `!reset` only correctly clears a field to empty -- giving it a non-empty
# replacement value (e.g. the backend's real uploads volume below) made
# Compose silently drop the key entirely rather than apply the new value, so
# `volumes: !reset [backend_uploads:/app/uploads]` resolved to NO volume
# mount at all. That went undetected through several rebuilds because
# `ports: !reset []` "worked" by coincidence -- resetting-to-empty and
# dropping-the-key-entirely both produce zero published ports, so the bug
# was invisible until uploaded files silently stopped persisting across
# container recreations. `!override` replaces the value outright regardless
# of whether it's empty or not; verified empirically via
# `docker compose ... config --format json` after this fix for both the
# empty-ports and non-empty-volumes cases.

services:
  postgres:
    ports: !override []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports: !override []
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    # Re-declares only the persistent uploads volume. Compose merges `volumes:`
    # ADDITIVELY across -f files just like `ports:` (see note above) — the
    # !override tag is required here too, or the dev file's src/prisma
    # bind-mounts would carry into prod and overlay the baked image's
    # contents with whatever (or nothing) exists at those host paths.
    volumes: !override
      - backend_uploads:/app/uploads
    ports: !override []
    restart: always
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    volumes: !override []
    ports: !override []
    restart: always
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/login', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    build:
      context: ./infrastructure/nginx
    container_name: vdr_nginx
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/letsencrypt:/etc/letsencrypt:ro
      - ./infrastructure/nginx/certbot-webroot:/var/www/certbot:ro
    networks:
      - vdr_network
      # Lets this same Nginx also proxy staging.vdr.variedreach.com to the
      # fully separate staging Compose project — see docker-compose.staging.yml
      # and STAGING.md. Production's own backend/frontend are unaffected;
      # they're never on this network.
      - vdr_edge
    deploy:
      resources:
        limits:
          memory: 128M

  # Not a long-running service — run on demand via
  # infrastructure/scripts/init-letsencrypt.sh (first issuance) or the
  # renewal cron job (see DEPLOYMENT.md). Shares the same two volumes as
  # nginx: the webroot for the HTTP-01 challenge, and the certificate
  # directory nginx reads from.
  certbot:
    image: certbot/certbot:latest
    container_name: vdr_certbot
    volumes:
      - ./infrastructure/nginx/letsencrypt:/etc/letsencrypt
      - ./infrastructure/nginx/certbot-webroot:/var/www/certbot
    networks:
      - vdr_network

networks:
  vdr_edge:
    external: true
