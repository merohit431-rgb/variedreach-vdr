services:
  postgres:
    image: postgres:16-alpine
    container_name: vdr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vdr_user
      POSTGRES_PASSWORD: vdr_password
      POSTGRES_DB: insolvency_vdr
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vdr_user -d insolvency_vdr']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vdr_network

  redis:
    image: redis:7-alpine
    container_name: vdr_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vdr_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: vdr_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: development
      PORT: 4000
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
      - ./packages/shared:/app/packages/shared
      - backend_uploads:/app/apps/backend/uploads
    ports:
      - '4000:4000'
    networks:
      - vdr_network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    container_name: vdr_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./apps/frontend/.env.local
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./packages/shared:/app/packages/shared
    ports:
      - '3000:3000'
    networks:
      - vdr_network

  # Headless LibreOffice behind an HTTP API — converts Word/Excel/PowerPoint
  # uploads to PDF so they can go through the same watermark/preview pipeline
  # PDFs already use. No `profiles:` restriction: unlike mailhog this needs
  # to run in dev, staging, and prod alike. No published port — only the
  # backend talks to it, over the internal vdr_network by service name.
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: vdr_gotenberg
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vdr_network

  # profiles, not deploy.replicas, is the correct way to keep a service out of
  # production: deploy.replicas is a Swarm-only construct that plain `docker
  # compose up` doesn't reliably honor, while profiles are a first-class
  # Compose V2 feature — a service with a profile only starts when that
  # profile is explicitly requested (see the `dev` profile flag below and in
  # the README), so the prod overlay needs no override for this at all.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: vdr_mailhog
    restart: unless-stopped
    profiles: ['dev']
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - vdr_network

volumes:
  postgres_data:
  backend_uploads:

networks:
  vdr_network:
    driver: bridge
