worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Docker's embedded DNS, reachable from any container on a user-defined
  # bridge network. Combined with the `set $upstream "http://host:port";
  # proxy_pass $upstream;` pattern below (instead of a static
  # `upstream { server host:port; }` block), this makes Nginx re-resolve
  # each backend hostname every 10s instead of once at worker startup.
  #
  # Without this, a backend container restarting -- whether from a deploy or
  # an OOM kill and Docker's restart:always bringing it back -- leaves Nginx
  # holding the old (now dead) address until someone notices the 502s and
  # reloads Nginx by hand. With it, Nginx picks up the new address on its
  # own within 10 seconds, no manual intervention required.
  #
  # Trade-off: this disables Nginx's upstream keepalive connection pooling
  # (that pooling is tied specifically to `upstream {}` blocks), so each
  # request opens a fresh connection to the backend instead of reusing one.
  # A small latency cost, worth it to eliminate this whole class of
  # "looks down but isn't really" incident.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Matches the upload ceiling in the file-type rules (2GB) — without this
  # Nginx's 1MB default silently 413s every real upload before it ever
  # reaches the backend.
  client_max_body_size 2g;

  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=500r/m;

  # Plain HTTP: only ever serves the Let's Encrypt ACME challenge, then
  # redirects everything else to HTTPS. This same block is what lets
  # certbot renew certificates later without any downtime — see
  # infrastructure/scripts/init-letsencrypt.sh and DEPLOYMENT.md. Staging
  # shares this block since the behavior (ACME challenge, then redirect) is
  # identical for both hostnames.
  server {
    listen 80;
    server_name vdr.variedreach.com staging.vdr.variedreach.com evoting.variedreach.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name vdr.variedreach.com;

    ssl_certificate     /etc/letsencrypt/live/vdr.variedreach.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vdr.variedreach.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      set $upstream "http://backend:4000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=general_limit burst=50 nodelay;
      set $upstream "http://backend:4000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # A 2GB upload/download needs real headroom past Nginx's 60s proxy
      # defaults — 1 hour comfortably covers even a slow connection
      # (2GB at ~0.6MB/s broadband upload speed is under an hour).
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /_next/static/ {
      set $upstream "http://frontend:3000";
      proxy_pass $upstream;
      proxy_cache_valid 200 60m;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
      set $upstream "http://frontend:3000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Staging — same routing shape as production above, pointed at the
  # staging backend/frontend and its own certificate. Staging's containers
  # live in a completely separate Compose project (see
  # docker-compose.staging.yml) reachable only via the shared external
  # `vdr_edge` network, under the `staging-backend`/`staging-frontend`
  # aliases — STAGING.md has the full picture. Keep this block's structure
  # in sync with the production block when editing either.
  server {
    listen 443 ssl;
    server_name staging.vdr.variedreach.com;

    ssl_certificate     /etc/letsencrypt/live/staging.vdr.variedreach.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.vdr.variedreach.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      set $upstream "http://staging-backend:4000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=general_limit burst=50 nodelay;
      set $upstream "http://staging-backend:4000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /_next/static/ {
      set $upstream "http://staging-frontend:3000";
      proxy_pass $upstream;
      proxy_cache_valid 200 60m;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
      set $upstream "http://staging-frontend:3000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # insolvency-evoting — separate app, separate repo (apps/web, apps/api),
  # deployed via its own docker-compose.prod.yml on this same VPS. Its
  # api/web containers join this vdr_edge network under the
  # evoting-backend/evoting-frontend aliases so this same Nginx can proxy
  # evoting.variedreach.com — see that repo's docs/deployment.md for the
  # full picture. No large-file upload path here (unlike vdr's 3600s rules
  # above), so plain default proxy timeouts are fine.
  server {
    listen 443 ssl;
    server_name evoting.variedreach.com;

    ssl_certificate     /etc/letsencrypt/live/evoting.variedreach.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evoting.variedreach.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      set $upstream "http://evoting-backend:4000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=general_limit burst=50 nodelay;
      set $upstream "http://evoting-backend:4000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
      set $upstream "http://evoting-frontend:3000";
      proxy_pass $upstream;
      proxy_cache_valid 200 60m;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
      set $upstream "http://evoting-frontend:3000";
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
