worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Matches the upload ceiling in the file-type rules (2GB) — without this
  # Nginx's 1MB default silently 413s every real upload before it ever
  # reaches the backend.
  client_max_body_size 2g;

  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=500r/m;

  upstream backend_upstream {
    server backend:4000;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  # Staging's backend/frontend live in a completely separate Compose project
  # (see docker-compose.staging.yml) reachable only via the shared external
  # `vdr_edge` network, under these aliases — STAGING.md has the full picture.
  upstream staging_backend_upstream {
    server staging-backend:4000;
  }

  upstream staging_frontend_upstream {
    server staging-frontend:3000;
  }

  # Plain HTTP: only ever serves the Let's Encrypt ACME challenge, then
  # redirects everything else to HTTPS. This same block is what lets
  # certbot renew certificates later without any downtime — see
  # infrastructure/scripts/init-letsencrypt.sh and DEPLOYMENT.md. Staging
  # shares this block since the behavior (ACME challenge, then redirect) is
  # identical for both hostnames.
  server {
    listen 80;
    server_name vdr.variedreach.com staging.vdr.variedreach.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name vdr.variedreach.com;

    ssl_certificate     /etc/letsencrypt/live/vdr.variedreach.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vdr.variedreach.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=general_limit burst=50 nodelay;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # A 2GB upload/download needs real headroom past Nginx's 60s proxy
      # defaults — 1 hour comfortably covers even a slow connection
      # (2GB at ~0.6MB/s broadband upload speed is under an hour).
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /_next/static/ {
      proxy_pass http://frontend_upstream;
      proxy_cache_valid 200 60m;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Staging — same routing shape as production above, pointed at the
  # staging upstreams and its own certificate. Keep this block's structure
  # in sync with the production block when editing either.
  server {
    listen 443 ssl;
    server_name staging.vdr.variedreach.com;

    ssl_certificate     /etc/letsencrypt/live/staging.vdr.variedreach.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.vdr.variedreach.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://staging_backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=general_limit burst=50 nodelay;
      proxy_pass http://staging_backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /_next/static/ {
      proxy_pass http://staging_frontend_upstream;
      proxy_cache_valid 200 60m;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
      proxy_pass http://staging_frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
